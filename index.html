<!doctype html>
<html lang=en>

  <head>
    <meta charset=utf-8>
    <link rel=stylesheet href=style.css>
    <script src=main.js type=module></script>
    <style> body { margin:0 } </style> 
  </head>
  
  <body>
    <canvas> </canvas>

    <!-- UI Control Panel-->
    <div class="controls">

      <!-- Video Toggle-->
      <div class="control-group">
        <label> <input type="checkbox" id="video-toggle"> Video Background </label>
      </div>

      <hr style="width: 100%; opacity: 0.3">

      <!-- Water Toggle-->
      <div class="control-group">
        <label> <input type="checkbox" id="water-toggle"> Water </label>
      </div>  
      <!-- Water Slider -->
      <div class="control-group">
        <label for="turbulence-slider"> Water Turbulence </label>
        <input type="range" id="turbulence-slider" min="0" max="1" step="0.01" value="0.2">
      </div>

      <hr style="width: 100%; opacity: 0.3">

      <!-- Fire Toggle -->
      <div class="control-group">
        <label> <input type="checkbox" id="fire-toggle"> Fire </label>
      </div>
      <!-- Fire Buttons-->
      <div class="control-group">
        <label> Fire Color: </label> <br> <br>
          <button id="btn-fire-red" class="color-button"> Red </button>
          <button id="btn-fire-green" class="color-button"> Green </button>
          <button id="btn-fire-blue" class="color-button"> Blue </button>
      </div>

      <hr style="width: 100%; opacity: 0.3">

      <!-- Earth Toggle -->
      <div class="control-group">
        <label> <input type="checkbox" id="earth-toggle"> Earth (Move Mouse)</label>
      </div>

      <hr style="width: 100%; opacity: 0.3">

      <!-- Electro Toggle -->
      <div class="control-group">
        <label> <input type="checkbox" id="electro-toggle"> Electro (Hold Down Left Click)</label>
      </div>


    </div>

  </body>
  
</html>
